version: 2.1

executors:
  kernel-builder:
    docker:
      - image: ubuntu:22.04
    resource_class: large

jobs:
  build:
    executor: kernel-builder
    steps:
      - run:
          name: Install base dependencies
          command: |
            apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ssh bc bison build-essential flex libssl-dev libelf-dev \
            python3 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            wget curl lld zstd cpio zip ca-certificates default-jre-headless

      - checkout

      - restore_cache:
          keys:
            - clang-toolchain-v1-{{ checksum "build.sh" }}

      - run:
          name: Show cache status
          command: |
            if [ -x clang-toolchain/bin/clang ]; then
              echo "Clang cache restored"
            else
              echo "No Clang cache found, will download in build.sh"
            fi

      - run:
          name: Build Kernel
          command: |
            chmod +x build.sh
            ./build.sh

      - save_cache:
          key: clang-toolchain-v1-{{ checksum "build.sh" }}
          paths:
            - clang-toolchain

      - store_artifacts:
          path: kernel-src/out-zip
          destination: KERNEL-BUILDS

workflows:
  kernel-workflow:
    jobs:
      - build

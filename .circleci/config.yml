version: 2.1

executors:
  kernel-builder:
    docker:
      - image: ubuntu:22.04
    resource_class: large

jobs:
  build:
    executor: kernel-builder
    steps:
      - checkout

      - run:
          name: Update apt and install dependencies
          command: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev python2 python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi wget lld

      - run:
          name: Build Kernel
          command: |
            chmod +x build.sh
            ./build.sh

      - store_artifacts:
          path: kernel-src/kernel-flashable.zip
          destination: kernel-flashable.zip

workflows:
  kernel-workflow:
    jobs:
      - build

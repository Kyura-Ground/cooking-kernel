name: Bug report
about: Create a report to help us improve
title: "[BUG] "
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
  - type: textarea
    id: logs
    attributes:
      label: Build Logs
      description: Paste relevant CI logs or errors here.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment/Context
      description: Kernel version, Clang version, and CircleCI project link.
